<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#4a5d4e" />
    <meta name="description" content="AI-powered career guidance platform with study materials, aptitude training, and personalized career advice." />
    <meta name="keywords" content="career guidance, AI assistant, study materials, aptitude test, career planning" />
    <meta name="author" content="CareerGuide AI" />
    <meta property="og:title" content="CareerGuide AI - Your Intelligent Career Partner" />
    <meta property="og:description" content="AI-powered career guidance platform with study materials, aptitude training, and personalized career advice." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <title>CareerGuide AI - Your Intelligent Career Partner</title>
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">
    
    <style>
      /* Critical CSS for initial load */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f8fafc 0%, #f0f4f8 100%);
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #4a5d4e 0%, #bc6c25 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      
      .loading-logo {
        font-size: 4rem;
        color: white;
        margin-bottom: 1rem;
        animation: spin 2s linear infinite;
      }
      
      .loading-text {
        color: white;
        font-size: 1.2rem;
        font-weight: 500;
      }
      
      .loading-dots::after {
        content: '...';
        animation: loadingDots 1.5s infinite;
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes loadingDots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
      }
      
      #root {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      #root.loaded {
        opacity: 1;
      }
      
      /* Performance optimizations */
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      
      .lazy-load {
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      .lazy-load.loaded {
        opacity: 1;
      }
    </style>
    
    <!-- Performance monitoring -->
    <script>
      // Performance monitoring
      window.addEventListener('load', function() {
        // Hide loading screen
        const loadingScreen = document.getElementById('loading-screen');
        const root = document.getElementById('root');
        
        if (loadingScreen && root) {
          loadingScreen.style.opacity = '0';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
            root.classList.add('loaded');
          }, 300);
        }
        
        // Log performance metrics
        if ('performance' in window) {
          const timing = performance.timing;
          const loadTime = timing.loadEventEnd - timing.navigationStart;
          console.log('Page load time:', loadTime + 'ms');
        }
      });
      
      // Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(registration) {
            console.log('ServiceWorker registration successful');
          }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">
      <i class="fas fa-brain loading-logo"></i>
      <p class="loading-text">Preparing your career journey<span class="loading-dots"></span></p>
    </div>
    
    <!-- Main App -->
    <div id="root"></div>
    
    <!-- Preload important images -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/hero-bg.svg">
    <link rel="preload" as="image" href="%PUBLIC_URL%/robot-illustration.svg">
    
    <!-- Performance analytics -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXX');
    </script>
  </body>
</html>
