<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="60" y="80" width="80" height="70" rx="10" fill="#3B82F6" />
  <!-- Head -->
  <rect x="70" y="30" width="60" height="45" rx="15" fill="#2563EB" />
  <!-- Antenna -->
  <line x1="100" y1="30" x2="100" y2="15" stroke="#1E40AF" stroke-width="4" stroke-linecap="round" />
  <circle cx="100" cy="10" r="5" fill="#60A5FA" />
  <!-- Eyes -->
  <circle cx="85" cy="52" r="6" fill="white" />
  <circle cx="115" cy="52" r="6" fill="white" />
  <circle cx="85" cy="52" r="3" fill="#1E3A8A" />
  <circle cx="115" cy="52" r="3" fill="#1E3A8A" />
  <!-- Mouth -->
  <path d="M85 65Q100 72 115 65" stroke="white" stroke-width="2" stroke-linecap="round" />
  <!-- Arms -->
  <rect x="40" y="90" width="20" height="10" rx="5" fill="#60A5FA" />
  <rect x="140" y="90" width="20" height="10" rx="5" fill="#60A5FA" />
  <!-- Screen/Chest -->
  <rect x="75" y="100" width="50" height="30" rx="4" fill="#1E3A8A" />
  <circle cx="85" cy="115" r="3" fill="#10B981" />
  <circle cx="100" cy="115" r="3" fill="#F59E0B" />
  <circle cx="115" cy="115" r="3" fill="#EF4444" />
</svg>
